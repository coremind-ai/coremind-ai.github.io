<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreMind AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: #F0F4FA;
      --muted: rgba(240, 244, 250, 0.5);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .video-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.04);
    }

    .video-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(6, 12, 26, 0.85) 0%,
        rgba(10, 22, 48, 0.80) 50%,
        rgba(7, 14, 32, 0.88) 100%
      );
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px;
      pointer-events: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .wordmark {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(240, 244, 250, 0.4);
      position: fixed;
      top: 2.2rem;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      z-index: 10;
    }

    .container {
      max-width: 580px;
      width: 100%;
      z-index: 10;
      position: relative;
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: 0.15s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .headline {
      font-size: clamp(2rem, 5.5vw, 3.1rem);
      font-weight: 300;
      line-height: 1.15;
      letter-spacing: -0.025em;
      color: #F8FAFF;
      margin-bottom: 1.4rem;
    }

    .headline strong { font-weight: 600; }

    .subline {
      font-size: clamp(0.88rem, 2.2vw, 1rem);
      font-weight: 400;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 2.8rem;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .cta {
      display: inline-block;
      padding: 0.95rem 2.8rem;
      background: transparent;
      border: 1px solid rgba(240, 244, 250, 0.28);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.25s ease, border-color 0.25s ease, letter-spacing 0.25s ease;
    }

    .cta:hover {
      border-color: rgba(240, 244, 250, 0.6);
      background: rgba(255, 255, 255, 0.05);
      letter-spacing: 0.22em;
    }

    .footer {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(240, 244, 250, 0.18);
      white-space: nowrap;
      z-index: 10;
    }

    @media (max-width: 480px) {
      .headline { font-size: 1.75rem; }
      .subline { font-size: 0.88rem; }
    }
  </style>
</head>
<body>

  <div class="video-bg">
    <video id="bgvid" autoplay muted loop playsinline preload="auto">
      <source src="office.mp4" type="video/mp4" />
    </video>
  </div>

  <div class="grain"></div>

  <span class="wordmark">CoreMind AI</span>

  <div class="container">
    <h1 class="headline">
      Intelligent operations,<br />
      <strong>built for your business.</strong>
    </h1>
    <p class="subline">
      We build AI infrastructure that works the way your team does —
      quietly, reliably, and without getting in the way.
    </p>
    <a class="cta" href="mailto:charles@coremindai.io">Get in touch</a>
  </div>

  <span class="footer">coremindai.io</span>

  <script>
    const vid = document.getElementById('bgvid');
    vid.muted = true;
    const tryPlay = () => vid.play().catch(() => {});
    tryPlay();
    document.addEventListener('click', tryPlay, { once: true });
    document.addEventListener('touchstart', tryPlay, { once: true });
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) tryPlay();
    });
  </script>

</body>
</html>
